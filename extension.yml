schema_version: "1.0"

extension:
  id: "confluence"
  name: "Spec Confluence"
  version: "1.0.0"
  description: "Create, read, and update Confluence docs for your project"
  author: "Aaron Sun"
  repository: "https://github.com/aaronrsun/spec-kit-confluence"
  license: "MIT"

requires:
  speckit_version: ">=0.1.0"

provides:
  commands:
    - name: "speckit.confluence.write"
      file: "commands/write.md"
      description: "Creates a Confluence doc summarizing the pre-implementation steps"
    - name: "speckit.confluence.read"
      file: "commands/read.md"
      description: "Retrieves the contents of an existing Confluence page"
    - name: "speckit.confluence.update"
      file: "commands/update.md"
      description: "Updates an existing Confluence doc with the latest specs and plans"

tags:
  - "confluence"
